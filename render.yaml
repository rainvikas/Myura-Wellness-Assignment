services:
  - type: web
    name: myura-wellness-app
    env: node
    plan: free
    healthCheckPath: /api/health
    buildCommand: npm install
    startCommand: npm run db:init && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: myura-wellness-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 100

databases:
  - name: myura-wellness-db
    plan: free
    databaseName: myura_wellness
    user: myura_user
